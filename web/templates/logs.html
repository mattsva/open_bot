{% block title %}Logs{% endblock %}

{% block content %}
<div class="Logs_Container">
    <h1>Application Logs</h1>
    <ul>
        {% for msg in messages %}
            <li>{{ msg }}</li>
        {% else %}
            <li>No log messages found.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
